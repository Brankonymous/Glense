services:
  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: glense_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - glense_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Account Service
  postgres_account:
    image: postgres:16-alpine
    container_name: glense_postgres_account
    environment:
      POSTGRES_DB: glense_account
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_account_data:/var/lib/postgresql/data
      - ./services/Glense.AccountService/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d glense_account"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Account Microservice
  account_service:
    build:
      context: ./services/Glense.AccountService
      dockerfile: Dockerfile
    container_name: glense_account_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ACCOUNT_REST_PORT=5000
      - ACCOUNT_GRPC_PORT=5001
      - ConnectionStrings__DefaultConnection=${ACCOUNT_DB_CONNECTION_STRING}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASS}
    ports:
      - "5001:5000"
      - "5003:5001"
    depends_on:
      postgres_account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

  # PostgreSQL for Video Service (placeholder for your teammates)
  postgres_video:
    image: postgres:16-alpine
    container_name: glense_postgres_video
    environment:
      POSTGRES_DB: glense_video
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_video_data:/var/lib/postgresql/data
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d glense_video"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Donation Service (placeholder for your teammates)
  postgres_donation:
    image: postgres:16-alpine
    container_name: glense_postgres_donation
    environment:
      POSTGRES_DB: glense_donation
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_donation_data:/var/lib/postgresql/data
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d glense_donation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Donation Microservice
  donation_service:
    build:
      context: ./Glense.Server/DonationService
      dockerfile: Dockerfile
    container_name: glense_donation_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=5100
      - DONATION_DB_CONNECTION_STRING=${DONATION_DB_CONNECTION_STRING}
      - ACCOUNT_SERVICE_URL=http://account_service:5000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASS}
    ports:
      - "5100:5100"
    depends_on:
      postgres_donation:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

  # PostgreSQL for Chat Service (placeholder for your teammates)
  postgres_chat:
    image: postgres:16-alpine
    container_name: glense_postgres_chat
    environment:
      POSTGRES_DB: glense_chat
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d glense_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Video Catalogue Microservice
  video_service:
    build:
      context: ./services/Glense.VideoCatalogue
      dockerfile: Dockerfile
    container_name: glense_video_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__VideoCatalogue=${VIDEO_DB_CONNECTION_STRING}
      - ACCOUNT_SERVICE_URL=http://account_service:5000
      - ACCOUNT_GRPC_URL=http://account_service:5001
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASS}
    ports:
      - "5002:5002"
    depends_on:
      postgres_video:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

  # API Gateway (YARP reverse proxy)
  gateway:
    build:
      context: ./Glense.Server
      dockerfile: Dockerfile
    container_name: glense_gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:5050
    ports:
      - "5050:5050"
    depends_on:
      account_service:
        condition: service_started
      video_service:
        condition: service_started
      donation_service:
        condition: service_started
      chat_service:
        condition: service_started
    networks:
      - glense_network
    restart: unless-stopped

  # Chat Service
  chat_service:
    build:
      context: ./services/Glense.ChatService
      dockerfile: Dockerfile
    container_name: glense_chat_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=${CHAT_DB_CONNECTION_STRING}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
    ports:
      - "5004:5000"
    depends_on:
      postgres_chat:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

networks:
  glense_network:
    driver: bridge

volumes:
  postgres_account_data:
  postgres_video_data:
  postgres_donation_data:
  postgres_chat_data:
