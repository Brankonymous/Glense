services:
  # PostgreSQL for Account Service
  postgres_account:
    image: postgres:16-alpine
    container_name: glense_postgres_account
    environment:
      POSTGRES_DB: glense_account
      POSTGRES_USER: glense
      POSTGRES_PASSWORD: glense123
    ports:
      - "5432:5432"
    volumes:
      - postgres_account_data:/var/lib/postgresql/data
      - ./services/Glense.AccountService/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glense -d glense_account"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Account Microservice
  account_service:
    build:
      context: ./services/Glense.AccountService
      dockerfile: Dockerfile
    container_name: glense_account_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres_account;Port=5432;Database=glense_account;Username=glense;Password=glense123
      - DONATION_SERVICE_URL=http://donation_service:5100
      - JWT_SECRET_KEY=YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm
      - JWT_ISSUER=GlenseAccountService
      - JWT_AUDIENCE=GlenseApp
    ports:
      - "5001:5000"
    depends_on:
      postgres_account:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

  # PostgreSQL for Video Service (placeholder for your teammates)
  postgres_video:
    image: postgres:16-alpine
    container_name: glense_postgres_video
    environment:
      POSTGRES_DB: glense_video
      POSTGRES_USER: glense
      POSTGRES_PASSWORD: glense123
    ports:
      - "5433:5432"
    volumes:
      - postgres_video_data:/var/lib/postgresql/data
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glense -d glense_video"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Donation Service (placeholder for your teammates)
  postgres_donation:
    image: postgres:16-alpine
    container_name: glense_postgres_donation
    environment:
      POSTGRES_DB: glense_donation
      POSTGRES_USER: glense
      POSTGRES_PASSWORD: glense123
    ports:
      - "5434:5432"
    volumes:
      - postgres_donation_data:/var/lib/postgresql/data
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glense -d glense_donation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Donation Microservice
  donation_service:
    build:
      context: ./Glense.Server/DonationService
      dockerfile: Dockerfile
    container_name: glense_donation_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=5100
      - DONATION_DB_CONNECTION_STRING=Host=postgres_donation;Port=5432;Database=glense_donation;Username=glense;Password=glense123
      - ACCOUNT_SERVICE_URL=http://account_service:5000
    ports:
      - "5100:5100"
    depends_on:
      postgres_donation:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

  # PostgreSQL for Chat Service (placeholder for your teammates)
  postgres_chat:
    image: postgres:16-alpine
    container_name: glense_postgres_chat
    environment:
      POSTGRES_DB: glense_chat
      POSTGRES_USER: glense
      POSTGRES_PASSWORD: glense123
    ports:
      - "5435:5432"
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    networks:
      - glense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glense -d glense_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Video Catalogue Microservice
  video_service:
    build:
      context: ./services/Glense.VideoCatalogue
      dockerfile: Dockerfile
    container_name: glense_video_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__VideoCatalogue=Host=postgres_video;Port=5432;Database=glense_video;Username=glense;Password=glense123
      - ACCOUNT_SERVICE_URL=http://account_service:5000
    ports:
      - "5002:5002"
    depends_on:
      postgres_video:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

  # API Gateway (YARP reverse proxy)
  gateway:
    build:
      context: ./Glense.Server
      dockerfile: Dockerfile
    container_name: glense_gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:5050
    ports:
      - "5050:5050"
    depends_on:
      - account_service
      - video_service
      - donation_service
      - chat_service
    networks:
      - glense_network
    restart: unless-stopped

  # Frontend (existing React app)
  frontend:
    build:
      context: ./glense.client
      dockerfile: Dockerfile
    container_name: glense_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5050
    networks:
      - glense_network
    depends_on:
      - gateway

  # Chat Service
  chat_service:
    build:
      context: ./services/Glense.ChatService
      dockerfile: Dockerfile
    container_name: glense_chat_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres_chat;Port=5432;Database=glense_chat;Username=glense;Password=glense123
      - JwtSettings__Issuer=GlenseAccountService
      - JwtSettings__Audience=GlenseApp
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm
    ports:
      - "5004:5000"
    depends_on:
      postgres_chat:
        condition: service_healthy
    networks:
      - glense_network
    restart: unless-stopped

networks:
  glense_network:
    driver: bridge

volumes:
  postgres_account_data:
  postgres_video_data:
  postgres_donation_data:
  postgres_chat_data:
