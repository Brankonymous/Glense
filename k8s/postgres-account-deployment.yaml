apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: postgres-account
  name: postgres-account
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres-account
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -o k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: postgres-account
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: glense_account
            - name: POSTGRES_PASSWORD
              value: changeme
            - name: POSTGRES_USER
              value: glense
          image: postgres:16-alpine
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U glense -d glense_account
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 5
          name: glense-postgres-account
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-account-data
            - mountPath: /docker-entrypoint-initdb.d/schema.sql
              name: postgres-account-cm1
              subPath: schema.sql
      restartPolicy: Always
      volumes:
        - name: postgres-account-data
          persistentVolumeClaim:
            claimName: postgres-account-data
        - configMap:
            items:
              - key: schema.sql
                path: schema.sql
            name: postgres-account-cm1
          name: postgres-account-cm1
